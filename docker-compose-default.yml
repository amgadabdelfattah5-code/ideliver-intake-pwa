version: '3.8'

# Alternative compose file for deploying to existing project
# Service names prefixed to avoid conflicts

services:
  intake-pwa-db:
    image: postgres:17-alpine
    container_name: intake-pwa-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ideliver_intake_pwa_secure_2025
      - POSTGRES_DB=ideliver_intake_pwa
    volumes:
      - intake_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - intake-network

  intake-pwa:
    image: node:20-alpine
    container_name: intake-pwa
    working_dir: /app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:ideliver_intake_pwa_secure_2025@intake-pwa-db:5432/ideliver_intake_pwa
      - SESSION_SECRET=ideliver_intake_pwa_session_secret_2025
      - WP_APP_USER=amged.mohammed@gmail.com
      - WP_APP_PASSWORD=JzNe xI72 Fl4p 35Qq QbYw f33U
      - WP_API_BASE=https://ideliveregypt.com/wp-json
    ports:
      - "3010:3000"  # Changed port to avoid conflicts
    volumes:
      - intake_uploads:/app/public/uploads
    command: sh -c "npm install && npm run build && npm start"
    depends_on:
      - intake-pwa-db
    restart: unless-stopped
    networks:
      - intake-network

volumes:
  intake_postgres_data:
  intake_uploads:

networks:
  intake-network:
    driver: bridge
